
 <div class="login-container w-full animate-fadein">

 <h2 class="text-3xl font-bold text-gray-900 mb-5">{{loginConfig.label}}</h2>


      <div class="flex items-center gap-2 mb-8 lg:hidden">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
          </svg>
        </div>
        <span class="text-blue-700 font-semibold">Exam App</span>
      </div>

      <div class="flex flex-col gap-5">

        <!-- Username Field -->
        <div class="flex flex-col gap-2">
          <label for="username" class="text-sm font-medium text-gray-700">Username</label>
          <input
            pInputText
            id="username"
            [(ngModel)]="username"
            placeholder="user123"
            class="w-full"
            [class.ng-invalid]="showError && !username"
            [class.ng-dirty]="showError"
          />
          @if(showError && !username){
 <small  class="text-red-500 text-xs">Username is required</small>
          }

        </div>

        <!-- Password Field -->
        <div class="flex flex-col gap-2">
          <label for="password" class="text-sm font-medium text-gray-700">Password</label>
          <p-password
            id="password"
            [(ngModel)]="password"
            [feedback]="false"
            [toggleMask]="true"
            placeholder="••••••••"
            styleClass="w-full"
            inputStyleClass="w-full"
            [class.ng-invalid]="showError && !password"
            [class.ng-dirty]="showError"
          />
          @if(showError && !password){
 <small  class="text-red-500 text-xs">Password is required</small>
          }

        </div>

        <!-- =Forgot -->
        <div class="flex items-center justify-start">

          <a routerLink="/forgot-password" class="text-sm text-blue-600 hover:text-blue-800 font-medium transition-colors">
            Forgot your password?
          </a>
        </div>

        <!-- Error message -->
         @if(loginError){
 <p-message  severity="error" [text]="loginError" styleClass="w-full p-3" />

         }

        <!-- Login Button -->
     <app-button [config]="loginConfig" (clicked)="onLogin()"   [loading]="isLoading()"></app-button>

      </div>

      <!-- Register link -->
      <p class="text-center text-sm text-gray-500 mt-8">
        Don't have an account?
        <a routerLink="/register" class="text-blue-600 hover:text-blue-800 font-semibold ml-1 transition-colors">
          Create yours
        </a>
      </p>

    </div>
